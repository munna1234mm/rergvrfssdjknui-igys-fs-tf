<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HIT | Premium Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Success Notification Overlay -->
  <div id="success-overlay" class="notification-overlay">
    <div class="notification-content">
      <span class="notif-icon">✅</span>
      <span id="notif-message">Payment successful! Card charged. Stopping.</span>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="modal-overlay">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">🔐</div>
        <h2>Hitter Login</h2>
        <p>Login with your Telegram Chat ID</p>
      </div>
      
      <div id="auth-phase-1">
        <div class="input-group">
          <label>Telegram Chat ID</label>
          <input type="text" id="chat-id-input" placeholder="8766583877">
        </div>
        <button id="send-otp-btn" class="btn-primary">SEND CODE</button>
      </div>

      <div id="auth-phase-2" style="display: none;">
        <div class="input-group">
          <label>6-Digit Verification Code</label>
          <input type="text" id="otp-input" placeholder="000000" maxlength="6">
          <p class="hint">Code sent to your Telegram bot.</p>
        </div>
        <button id="verify-otp-btn" class="btn-primary">VERIFY & LOGIN</button>
      </div>
      <div id="auth-error" class="login-error"></div>
    </div>
  </div>

  <!-- Main App -->
  <header id="main-header" style="display: none;">
    <div class="header-left">
      <span class="close-icon">✕</span>
      <span class="header-title">HIT</span>
    </div>
    <div class="header-right">
       <span id="user-profile" class="profile-info">
         <span id="user-name">User</span>
         <div class="profile-avatar">👤</div>
       </span>
       <span class="menu-icon">⋮</span>
    </div>
  </header>

  <main class="main-content" id="dashboard-content" style="display: none;">
    
    <!-- Gate Selection Cards -->
    <div class="gate-grid">
      <div class="gate-card active" data-gate="checkout">
        <div class="gate-icon">🛒</div>
        <span>checkout.stripe.com</span>
      </div>
      <div class="gate-card" data-gate="invoice">
        <div class="gate-icon">📄</div>
        <span>invoice.stripe.com</span>
      </div>
    </div>

    <div class="form-section">
      <div class="label-group">CHECKOUT URL</div>
      <div class="input-wrapper">
        <input type="text" id="stripe-url" placeholder="https://checkout.stripe.com/c/pay/cs_live_..." value="">
      </div>

      <!-- Mode Switcher -->
      <div class="mode-tabs">
        <div class="mode-tab active" id="mode-cards-tab">📂 Cards</div>
        <div class="mode-tab" id="mode-bin-tab">✨ Charge with BIN</div>
      </div>

      <!-- Input Areas based on mode -->
      <div id="input-cards-area">
        <textarea id="cards-input" rows="5" placeholder="4242424242424242|MM|YY|CVC"></textarea>
      </div>

      <div id="input-bin-area" style="display: none;">
        <div class="bin-row">
          <input type="text" id="bin-input" placeholder="374355" maxlength="6">
          <input type="number" id="bin-amount" placeholder="10" value="10">
          <button id="gen-btn" class="icon-btn">💾</button>
        </div>
      </div>

      <button id="start-btn" class="btn-action">🚀 Charge with BIN</button>
    </div>

    <!-- Results Section -->
    <div id="results-overview" class="results-container" style="display: none;">
      <div class="results-header">
        <span>RESULTS</span>
        <div class="stats-row">
          <span class="stat-badge total" id="stat-total">0 total</span>
          <span class="stat-badge charged" id="stat-charged">0 Charged</span>
          <span class="stat-badge 3ds" id="stat-3ds">0 3DS Bypassed</span>
          <span class="stat-badge dead" id="stat-declined">0 Declined</span>
        </div>
      </div>
      
      <div class="log-controls">
         <div id="copy-btn">📋 Copy Charged</div>
      </div>

      <div id="log-output" class="result-list"></div>
    </div>

  </main>

  <script src="main.js"></script>
</body>
</html>
